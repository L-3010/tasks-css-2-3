<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2 - Bootstrap Version</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="task2.css">
</head>
<body class="bg-light">

<div class="d-flex" id="wrapper">
    <div class="bg-dark text-white" id="sidebar-wrapper">
        <div class="sidebar-heading border-bottom border-secondary p-3 fs-5 fw-bold">
            <i class="fas fa-rocket text-primary me-2"></i> Brand Name
        </div>
        <div class="list-group list-group-flush">
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white-50 active"><i class="fa fa-th-large me-3"></i>Dashboard</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white-50"><i class="fas fa-chart-line me-3"></i>Analytics</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white-50"><i class="fas fa-envelope me-3"></i>Messages</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white-50"><i class="fas fa-cog me-3"></i>Settings</a>
        </div>
    </div>

    <div id="page-content-wrapper">
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-3 shadow-sm sticky-top">
            <button class="btn btn-light border" id="menu-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="h5 mb-0 ms-3 fw-bold">Dashboard</h1>
            
            <div class="ms-auto d-flex align-items-center gap-3">
                <div class="input-group d-none d-md-flex">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-search text-muted"></i></span>
                    <input type="text" class="form-control bg-light border-start-0" placeholder="Search...">
                </div>
                <img src="https://i.pravatar.cc/40" alt="user" class="rounded-circle border" width="38">
            </div>
        </nav>

        <div class="container-fluid p-4">
            <h2 class="h4 fw-bold mb-4">Dashboard Overview</h2>

            <div <div class="row g-4 mb-4">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card border-0 shadow-sm p-3 d-flex flex-row align-items-center">
            <div class="rounded-3 bg-primary bg-opacity-10 p-3 text-primary me-3">
                <i class="fas fa-shopping-cart"></i>
            </div>
            <div>
                <h3 class="h5 mb-0 fw-bold">$7,500</h3>
                <p class="text-muted mb-0 small">Total Sales</p>
            </div>
        </div>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
        <div class="card border-0 shadow-sm p-3 d-flex flex-row align-items-center">
            <div class="rounded-3 bg-success bg-opacity-10 p-3 text-success me-3">
                <i class="fas fa-users"></i>
            </div>
            <div>
                <h3 class="h5 mb-0 fw-bold">1,250</h3>
                <p class="text-muted mb-0 small">New Users</p>
            </div>
        </div>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
        <div class="card border-0 shadow-sm p-3 d-flex flex-row align-items-center">
            <div class="rounded-3 bg-warning bg-opacity-10 p-3 text-warning me-3">
                <i class="fas fa-box"></i>
            </div>
            <div>
                <h3 class="h5 mb-0 fw-bold">3,200</h3>
                <p class="text-muted mb-0 small">Total Orders</p>
            </div>
        </div>
    </div>
</div>

            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title fw-bold mb-3">Recent Transactions</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Order ID</th>
                                    <th>Customer</th>
                                    <th>Status</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>#10001</td>
                                    <td>John Doe</td>
                                    <td><span class="badge rounded-pill bg-success-subtle text-success">Paid</span></td>
                                    <td>$120.00</td>
                                </tr>
                                <tr>
                                    <td>#10002</td>
                                    <td>Jane Smith</td>
                                    <td><span class="badge rounded-pill bg-warning-subtle text-warning">Pending</span></td>
                                    <td>$75.00</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleSidebar() {
        document.getElementById('wrapper').classList.toggle('toggled');
    }
</script>
</body>
</html>
